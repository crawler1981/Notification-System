version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: notification-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notification-net

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: notification-gateway
    ports:
      - "9000:9000"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - notification-net

  notification:
    build:
      context: .
      dockerfile: notification/Dockerfile
    container_name: notification-service
    ports:
      - "9001:9001"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - notification-net

  library:
    build:
      context: .
      dockerfile: library/Dockerfile
    container_name: library-service
    ports:
      - "50051:50051"
    networks:
      - notification-net

networks:
  notification-net:
    driver: bridge
volumes:                
  rabbitmq_data: 
